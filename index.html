<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Synax</title>
  <link rel="icon" type="image/png" href="https://nexucore.github.io/Synax/assets/Synax_better.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #121212;
      --fg: #e8e8e8;
      --muted: #999;
      --border: #2e2e2e;
      --card: #1e1e1e;
      --hover: #252525;
      --primary: #8ab4f8;
      --tag-bg: #2a2a2a;
      --tag-fg: #aaa;
      --link: #8ab4f8;
      --link-visited: #c58af9;
      --shadow: 0 1px 6px rgba(0,0,0,.4);
      --green: #8bc34a;
      --serif: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
    * { scrollbar-width: thin; scrollbar-color: #3a3a3a #1a1a1a; }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }
    body {
      font-family: var(--serif);
      background: var(--bg);
      color: var(--fg);
    }

    /* ══════════ HOME PAGE ══════════ */
    #homePage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }
    .home-logo {
      margin-bottom: 16px;
      text-align: center;
    }
    .home-logo img {
      max-width: 300px; height: auto;
    }

    /* ── SEARCH BAR (home) ── */
    .search-wrap { position: relative; width: 100%; max-width: 640px; }
    .search-bar {
      display: flex; align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 40px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, border-color 0.2s;
      overflow: hidden;
    }
    .search-bar:focus-within {
      border-color: rgba(66,133,244,.4);
      box-shadow: 0 1px 12px rgba(66,133,244,.3);
    }
    .search-bar input {
      flex: 1; padding: 16px 22px;
      font-family: var(--serif); font-size: 17px;
      border: none; outline: none; background: transparent;
      color: var(--fg);
    }
    .search-bar input::placeholder { color: var(--muted); }
    .search-bar .bar-btn {
      padding: 12px 18px; background: none; border: none;
      cursor: pointer; color: var(--muted);
      display: flex; align-items: center;
      transition: color 0.15s;
    }
    .search-bar .bar-btn:hover { color: var(--primary); }
    .search-btns {
      display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; justify-content: center;
    }
    .search-action-btn {
      padding: 10px 22px;
      background: var(--tag-bg); border: 1px solid var(--border);
      border-radius: 4px; font-family: var(--serif); font-size: 14px;
      color: var(--fg); cursor: pointer;
      transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
    }
    .search-action-btn:hover {
      background: var(--hover);
      border-color: #555;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }
    .quick-links {
      display: flex; gap: 10px; margin-top: 28px;
      flex-wrap: wrap; justify-content: center;
    }
    .quick-pill {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      background: var(--tag-bg); border: 1px solid var(--border);
      padding: 5px 12px; border-radius: 20px; cursor: pointer;
      transition: background 0.1s, color 0.1s;
      letter-spacing: 0.3px;
    }
    .quick-pill:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

    .autocomplete-drop {
      display: none; position: absolute;
      top: calc(100% + 6px); left: 0; right: 0;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.12);
      z-index: 100; overflow: hidden;
    }
    .autocomplete-drop.open { display: block; animation: fadeUp 0.12s ease both; }
    .ac-section-label {
      font-family: var(--mono); font-size: 10px; font-weight: 500;
      letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
      padding: 10px 14px 6px; border-bottom: 1px solid var(--border);
      background: var(--hover);
    }
    .ac-item {
      display: flex; align-items: center; gap: 11px;
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.focused { background: var(--hover); }
    .ac-item-icon { flex-shrink: 0; color: var(--muted); display: flex; align-items: center; }
    .ac-item-icon img { width: 16px; height: 16px; border-radius: 2px; object-fit: contain; }
    .ac-item-text { flex: 1; min-width: 0; }
    .ac-item-title { font-size: 13.5px; color: var(--fg); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ac-item-title b { font-weight: 600; }
    .ac-item-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 1px; }
    .ac-item-arrow { flex-shrink: 0; color: #bbb; font-size: 12px; }

    /* ══════════ RESULTS PAGE ══════════ */
    #resultsPage { display: none; }

    .results-topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex; align-items: center; gap: 20px;
      flex-wrap: wrap;
      position: sticky; top: 0; z-index: 50;
    }
    .results-logo {
      cursor: pointer; flex-shrink: 0;
    }
    .results-logo img {
      height: 36px; width: auto;
      display: block;
    }
    .results-search-wrap {
      flex: 1; max-width: 580px; position: relative;
    }
    .results-bar {
      display: flex; align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, border-color 0.2s;
      overflow: visible;
    }
    .results-bar:focus-within {
      border-color: rgba(66,133,244,.4);
      box-shadow: 0 1px 8px rgba(66,133,244,.25);
    }
    .results-bar input {
      flex: 1; padding: 10px 18px;
      font-family: var(--serif); font-size: 15px;
      border: none; outline: none; background: transparent;
      color: var(--fg);
    }
    .results-bar .bar-btn {
      padding: 8px 14px; background: none; border: none;
      cursor: pointer; color: var(--muted);
      display: flex; align-items: center;
      transition: color 0.15s;
    }
    .results-bar .bar-btn:hover { color: var(--primary); }
    .results-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      padding: 0 24px;
    }
    .rtab {
      font-family: var(--serif); font-size: 13px; font-weight: 400;
      color: var(--muted); padding: 12px 16px; cursor: pointer;
      background: none; border: none;
      border-bottom: 3px solid transparent;
      transition: color 0.15s; letter-spacing: 0.2px;
    }
    .rtab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }
    .rtab:hover:not(.active) { color: var(--fg); }

    /* ── MAIN LAYOUT ── */
    .results-layout {
      max-width: 1060px; margin: 0 auto;
      padding: 28px 24px;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 48px;
    }

    .results-meta {
      font-size: 12px; color: var(--muted);
      margin-bottom: 20px; font-family: var(--serif);
    }

    /* ── RESULT ITEM ── */
    .result-item {
      margin-bottom: 32px;
      animation: fadeUp 0.2s ease both;
    }
    .result-source-row {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 4px;
    }
    .result-favicon {
      width: 16px; height: 16px; border-radius: 3px;
      object-fit: contain; flex-shrink: 0;
    }
    .result-domain {
      font-size: 13px; color: var(--fg); line-height: 1;
    }
    .result-breadcrumb {
      font-size: 13px; color: var(--muted);
    }
    .result-title {
      font-size: 19px; font-weight: 400;
      color: var(--link); text-decoration: none;
      display: block; margin-bottom: 5px;
      line-height: 1.3;
    }
    .result-title:hover { text-decoration: underline; }
    [data-theme="dark"] .result-title { color: var(--primary); }
    .result-snippet {
      font-size: 13.5px; color: #555; line-height: 1.65;
    }
    [data-theme="dark"] .result-snippet { color: #bbb; }
    .result-snippet mark {
      background: none; color: var(--fg); font-weight: 600;
    }
    .result-og {
      display: block; margin-top: 10px;
      max-width: 380px; max-height: 180px; object-fit: cover;
      border-radius: 4px; border: 1px solid var(--border);
    }
    .result-tag {
      display: inline-block;
      font-family: var(--mono); font-size: 10px; color: var(--tag-fg);
      background: var(--tag-bg); padding: 3px 8px; border-radius: 2px;
      margin-top: 8px; letter-spacing: 0.3px;
    }

    /* ── IMAGE GRID (images tab) ── */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      grid-column: 1 / -1;
    }
    .image-grid-item {
      position: relative; cursor: pointer;
      border-radius: 6px; overflow: hidden;
      border: 1px solid var(--border);
      background: var(--card);
      animation: fadeUp 0.2s ease both;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .image-grid-item:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
    }
    .image-grid-item img {
      width: 100%; height: 150px; object-fit: cover; display: block;
    }
    .image-grid-caption {
      padding: 6px 8px;
      font-size: 11px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: var(--mono);
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.88);
      align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; animation: fadeUp 0.15s ease both; }
    #lightbox img {
      max-width: 90vw; max-height: 90vh;
      object-fit: contain; border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
      cursor: default;
    }
    #lightbox-close {
      position: absolute; top: 20px; right: 28px;
      font-size: 28px; color: #fff; cursor: pointer;
      background: none; border: none; line-height: 1;
      opacity: 0.7; transition: opacity 0.15s;
    }
    #lightbox-close:hover { opacity: 1; }

    /* ── SIDEBAR ── */
    .infobox {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; margin-bottom: 18px;
      box-shadow: var(--shadow);
    }
    .infobox-body { padding: 16px; }
    .infobox-logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .infobox-logo img { width: 22px; height: 22px; border-radius: 3px; object-fit: contain; }
    .infobox-title { font-size: 16px; font-weight: 600; color: var(--fg); line-height: 1.3; }
    .infobox-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .infobox-desc { font-size: 13px; color: #555; line-height: 1.65; margin: 10px 0 12px; }
    [data-theme="dark"] .infobox-desc { color: #bbb; }
    .infobox-link {
      font-family: var(--mono); font-size: 11px; color: var(--primary);
      text-decoration: none;
    }
    .infobox-link:hover { text-decoration: underline; }

    .sidebar-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px; margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .sidebar-card h3 {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
      margin-bottom: 14px;
    }
    .related-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; text-decoration: none; color: inherit;
    }
    .related-item:last-child { border-bottom: none; padding-bottom: 0; }
    .related-item:hover .rel-title { color: var(--primary); }
    .rel-icon { flex-shrink: 0; margin-top: 2px; color: var(--muted); }
    .rel-title { font-size: 13px; color: var(--fg); line-height: 1.4; }
    .filter-group { margin-bottom: 10px; }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-label {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      letter-spacing: 0.5px; display: block; margin-bottom: 8px;
    }
    .filter-opts { display: flex; flex-wrap: wrap; gap: 6px; }
    .filter-btn {
      font-family: var(--mono); font-size: 11px;
      padding: 5px 10px; cursor: pointer; border-radius: 3px;
      border: 1px solid var(--border);
      background: var(--tag-bg); color: var(--tag-fg);
      letter-spacing: 0.3px; transition: all 0.1s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--primary); color: #fff; border-color: var(--primary);
    }

    /* ── LOADING / EMPTY ── */
    .state-loading, .state-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: calc(100vh - 160px);
      grid-column: 1/-1;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-bottom: 14px;
    }
    .state-loading p, .state-empty p {
      font-size: 14px; color: var(--muted);
    }
    .state-empty svg { margin-bottom: 16px; color: #ccc; }

    /* ── ANIMS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FAVORITES ── */
    .favorites-section {
      width: 100%; max-width: 640px;
      margin-top: 32px;
    }
    .favorites-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .favorites-header span {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
    }
    .favorites-add-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; font-family: var(--serif);
      padding: 5px 10px; border-radius: 4px; cursor: pointer;
      transition: all 0.15s;
    }
    .favorites-add-btn:hover { border-color: var(--primary); color: var(--primary); }
    .favorites-grid {
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .fav-item {
      display: flex; align-items: center; gap: 8px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
      cursor: pointer; text-decoration: none;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      max-width: 180px; min-width: 100px;
      position: relative;
      animation: fadeUp 0.2s ease both;
    }
    .fav-item:hover { background: var(--hover); border-color: #555; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    .fav-item img { width: 18px; height: 18px; border-radius: 3px; object-fit: contain; flex-shrink: 0; }
    .fav-item-name {
      font-size: 13px; color: var(--fg);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fav-delete {
      position: absolute; top: -6px; right: -6px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #444; border: none; color: #fff;
      font-size: 11px; cursor: pointer; line-height: 18px; text-align: center;
      display: none; align-items: center; justify-content: center;
      transition: background 0.1s;
    }
    .fav-item:hover .fav-delete { display: flex; }
    .fav-delete:hover { background: #e44; }
    .fav-empty {
      font-size: 13px; color: var(--muted); font-style: italic;
    }
    .fav-item[draggable="true"] { cursor: grab; }
    .fav-item[draggable="true"]:active { cursor: grabbing; }
    .fav-item.dragging {
      opacity: 0.4;
      transform: scale(0.97);
    }
    .fav-item.drag-over {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(138,180,248,0.35);
    }

    /* ── ADD FAVORITE MODAL ── */
    #favModal {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,.6);
      align-items: center; justify-content: center;
    }
    #favModal.open { display: flex; animation: fadeUp 0.15s ease both; }
    .fav-modal-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 24px; width: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .fav-modal-box h3 {
      font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--fg);
    }
    .fav-modal-field {
      display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px;
    }
    .fav-modal-field label {
      font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.5px;
    }
    .fav-modal-field input {
      padding: 9px 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--fg); font-family: var(--serif); font-size: 14px;
      outline: none; transition: border-color 0.15s;
    }
    .fav-modal-field input:focus { border-color: var(--primary); }
    .fav-modal-actions {
      display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px;
    }
    .fav-modal-cancel {
      padding: 8px 16px; background: none; border: 1px solid var(--border);
      border-radius: 4px; color: var(--muted); cursor: pointer; font-size: 13px;
      transition: border-color 0.15s;
    }
    .fav-modal-cancel:hover { border-color: #555; }
    .fav-modal-save {
      padding: 8px 16px; background: var(--primary); border: none;
      border-radius: 4px; color: #fff; cursor: pointer; font-size: 13px;
      font-weight: 500; transition: opacity 0.15s;
    }
    .fav-modal-save:hover { opacity: 0.85; }

    /* ── RESPONSIVE ── */
    @media (max-width: 760px) {
      .results-layout { grid-template-columns: 1fr; padding: 20px 16px; gap: 0; }
      .sidebar { display: none; }
      .results-topbar { padding: 10px 16px; }
      .results-tabs { padding: 0 16px; }
      #homePage { padding: 60px 16px 40px; }
    }
  </style>
</head>
<body>

<!-- ══════════════ HOME PAGE ══════════════ -->
<div id="homePage">

  <div class="home-logo">
    <img src="https://nexucore.github.io/Synax/assets/SynaxFullLogo.png" alt="Synax"/>
  </div>

  <div class="search-wrap" id="homeWrap">
    <div class="search-bar" id="homeBar">
      <input type="text" id="homeInput" placeholder="Search the web…" autocomplete="off" spellcheck="false"/>
      <button class="bar-btn" onclick="doSearch()" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
    <div class="autocomplete-drop" id="homeAC"></div>
  </div>

  <div class="search-btns">
    <button class="search-action-btn" onclick="doSearch()">Synax Search</button>
    <button class="search-action-btn" onclick="feelingLucky()">I'm Feeling Lucky</button>
  </div>

  <!-- Favorites -->
  <div class="favorites-section">
    <div class="favorites-header">
      <span>Favorites</span>
      <button class="favorites-add-btn" onclick="openFavModal()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add
      </button>
    </div>
    <div class="favorites-grid" id="favGrid"></div>
  </div>
</div>

<!-- ADD FAVORITE MODAL -->
<div id="favModal" onclick="closeFavModal(event)">
  <div class="fav-modal-box" onclick="event.stopPropagation()">
    <h3>Add Favorite</h3>
    <div class="fav-modal-field">
      <label>NAME</label>
      <input type="text" id="favNameInput" placeholder="e.g. YouTube"/>
    </div>
    <div class="fav-modal-field">
      <label>URL</label>
      <input type="text" id="favUrlInput" placeholder="e.g. https://youtube.com"/>
    </div>
    <div class="fav-modal-actions">
      <button class="fav-modal-cancel" onclick="closeFavModal()">Cancel</button>
      <button class="fav-modal-save" onclick="saveFavorite()">Save</button>
    </div>
  </div>
</div>

<!-- ══════════════ RESULTS PAGE ══════════════ -->
<div id="resultsPage">

  <!-- Top bar -->

async function _r(b64) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const e = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', e.encode(_k), {name:'PBKDF2'}, false, ['deriveKey']);
  const dk = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:raw.slice(0,16), iterations:100000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']
  );
  return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM', iv:raw.slice(16,28)}, dk, raw.slice(28)));
}

// ── SEARCH HISTORY ───────────────────────────────────────────────────────────
function getSearchHistory() {
  try { return JSON.parse(localStorage.getItem('synax-history') || '[]'); } catch { return []; }
}
function saveToHistory(q) {
  let history = getSearchHistory().filter(s => s !== q);
  history.unshift(q);
  history = history.slice(0, 8);
  localStorage.setItem('synax-history', JSON.stringify(history));
}
function getDefaultSuggestions() {
  const history = getSearchHistory();
  if (history.length > 0) {
    return history.map(q => ({ q, sub: 'Recent search' }));
  }
  return SEED_SUGGESTIONS;
}
function getDefaultLabel() {
  return getSearchHistory().length > 0 ? 'Recent searches' : 'Popular searches';
}

// ── HELPERS ─────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function buildSearchIcon(size=13) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
}
function highlightMatch(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return escHtml(text.slice(0, idx)) + '<b>' + escHtml(text.slice(idx, idx + query.length)) + '</b>' + escHtml(text.slice(idx + query.length));
}

// ── AUTOCOMPLETE ─────────────────────────────────────────────────────────────
function renderAC(dropEl, items, inputEl, query, label) {
  if (!items || !items.length) { closeAC(dropEl); return; }
  focusedAcIdx = -1;
  const sectionLabel = label || (query ? 'Suggestions' : 'Popular searches');
  const headerHtml = `<div class="ac-section-label">${sectionLabel}</div>`;
  const rows = items.slice(0,8).map((item,i) => {
    const icon = item.favicon
      ? `<img src="${item.favicon}" onerror="this.style.display='none'" alt=""/>`
      : buildSearchIcon();
    return `<div class="ac-item" data-idx="${i}" data-query="${escHtml(item.q)}"
      onclick="pickAC(this,'${escHtml(item.q)}','${dropEl.id}','${inputEl.id}')">
      <div class="ac-item-icon">${icon}</div>
      <div class="ac-item-text">
        <div class="ac-item-title">${highlightMatch(item.q, query)}</div>
        ${item.sub ? `<div class="ac-item-sub">${escHtml(item.sub)}</div>` : ''}
      </div>
      <div class="ac-item-arrow">↗</div>
    </div>`;
  }).join('');
  dropEl.innerHTML = headerHtml + rows;
  dropEl.classList.add('open');
}
function closeAC(el) { el.classList.remove('open'); focusedAcIdx = -1; }
function pickAC(el, q, dropId, inputId) {
  document.getElementById(inputId).value = q;
  closeAC(document.getElementById(dropId));
  inputId === 'homeInput' ? doSearch() : doSearch(true);
}

async function fetchSuggestions(query) {
  await _ready;
  if (acCache[query]) return acCache[query];
  const prompt = `You are a search autocomplete engine. The user typed: "${query}"
Return ONLY a JSON array of 6 suggestion objects (no markdown). Each: {"q":"suggestion text","sub":"short category"}
JSON only.`;
  try {
    const res = await fetch(AC_BASE, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${AC_KEY}`,'HTTP-Referer':'https://nexucore.github.io/Synax/','X-Title':'Synax'},
      body: JSON.stringify({ model:AC_MODEL, messages:[{role:'user',content:prompt}], max_tokens:300, temperature:0.4 })
    });
    const data = await res.json();
    const raw = data.choices?.[0]?.message?.content?.trim() || '[]';
    const clean = raw.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```$/,'').trim();
    const parsed = JSON.parse(clean);
    acCache[query] = Array.isArray(parsed) ? parsed : [];
    return acCache[query];
  } catch { return []; }
}

function initAC(inputId, dropId) {
  const input = document.getElementById(inputId);
  const drop  = document.getElementById(dropId);
  input.addEventListener('focus', () => {
    if (!input.value.trim()) renderAC(drop, getDefaultSuggestions(), input, '', getDefaultLabel());
  });
  input.addEventListener('input', () => {
    const q = input.value.trim();
    if (!q) { renderAC(drop, getDefaultSuggestions(), input, '', getDefaultLabel()); return; }
    clearTimeout(acDebounceTimer);
    acDebounceTimer = setTimeout(async () => {
      const s = await fetchSuggestions(q);
      if (input.value.trim() === q) renderAC(drop, s, input, q, 'Suggestions');
    }, 320);
  });
  input.addEventListener('keydown', e => {
    const items = drop.querySelectorAll('.ac-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      focusedAcIdx = Math.min(focusedAcIdx+1, items.length-1);
      items.forEach((el,i) => el.classList.toggle('focused', i===focusedAcIdx));
      if (items[focusedAcIdx]) input.value = items[focusedAcIdx].dataset.query;
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      focusedAcIdx = Math.max(focusedAcIdx-1, -1);
      items.forEach((el,i) => el.classList.toggle('focused', i===focusedAcIdx));
      if (focusedAcIdx>=0 && items[focusedAcIdx]) input.value = items[focusedAcIdx].dataset.query;
    } else if (e.key === 'Escape') {
      closeAC(drop);
    } else if (e.key === 'Enter') {
      closeAC(drop);
      inputId==='homeInput' ? doSearch() : doSearch(true);
    }
  });
  document.addEventListener('click', e => {
    if (!drop.contains(e.target) && e.target!==input) closeAC(drop);
  });
}

// ── ROUTING ─────────────────────────────────────────────────────────────────
function goHome() {
  document.getElementById('homePage').style.display    = 'flex';
  document.getElementById('resultsPage').style.display = 'none';
  document.getElementById('homeInput').value = '';
  setTimeout(() => document.getElementById('homeInput').focus(), 50);
  history.pushState({}, '', location.pathname);
}
function setQuery(q) {
  document.getElementById('homeInput').value = q;
  doSearch();
}
function feelingLucky() {
  const urls = LOCAL_SITES.map(s => s.url);
  const pick = urls[Math.floor(Math.random() * urls.length)];
  window.location.href = pick;
}
function looksLikeUrl(str) {
  // Already has a protocol
  if (/^https?:\/\//i.test(str)) return true;
  // domain.tld or domain.tld/path — must have a dot, no spaces, valid TLD-ish suffix
  return /^[^\s]+\.[a-z]{2,}(\/.*)?$/i.test(str) && !str.includes(' ');
}
function doSearch(fromResults=false) {
  const q = fromResults
    ? document.getElementById('resultsInput').value.trim()
    : document.getElementById('homeInput').value.trim();
  if (!q) return;
  // Navigate directly if it looks like a URL
  if (looksLikeUrl(q)) {
    const href = /^https?:\/\//i.test(q) ? q : 'https://' + q;
    window.location.href = href;
    return;
  }
  closeAC(document.getElementById('homeAC'));
  closeAC(document.getElementById('resultsAC'));
  currentQuery = q;
  saveToHistory(q);
  document.getElementById('homePage').style.display    = 'none';
  document.getElementById('resultsPage').style.display = 'block';
  document.getElementById('resultsInput').value = q;
  document.querySelectorAll('.rtab').forEach((t,i) => t.classList.toggle('active', i===0));
  currentTab = 'all';
  const url = new URL(location.href);
  url.searchParams.set('q', q);
  history.pushState({}, '', url.toString());
  renderResults();
}
function setTab(btn, tab) {
  document.querySelectorAll('.rtab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentTab = tab;
  if (tab !== 'all') document.getElementById('sidebar').innerHTML = '';
  renderResults();
}

// ── AI: STEP 1 and Get URLs from Pollinations ──────────────────────────────────
async function fetchAIResults(query) {
  if (aiResultsCache[query]) return aiResultsCache[query];

  const res = await fetch(`http://synax-api.up.railway.app/api/search?q=${encodeURIComponent(query)}&count=10`);
  if (!res.ok) throw new Error(`Search API ${res.status}`);
  const data = await res.json();

  // Convert your API's result format into the shape the rest of the code expects
  const urls = (data.results || []).map(r => r.url);

  // Build metas directly from the API results (no need to call fetchMeta for title/description)
  const metas = (data.results || []).map(r => {
    const domain = (() => { try { return new URL(r.url).hostname.replace('www.',''); } catch { return r.url; } })();
    return {
      url:         r.url,
      domain:      domain,
      title:       r.title || domain,
      description: r.description || '',
      favicon:     `https://www.google.com/s2/favicons?domain=${encodeURIComponent(r.url)}&sz=32`,
      ogImage:     null
    };
  });

  // Still ask AI for the infobox + related searches only
  let infobox = null, related = [];
  try {
    await _ready;
    // Wikipedia infobox (free, no AI needed)
    infobox = await fetchWikipediaInfobox(query);

    // AI only for related searches now
    const prompt = `The user searched for: "${query}"
Return ONLY a JSON array of 4 related search queries, no markdown. Example: ["query 1","query 2","query 3","query 4"]`;
    const aiRes = await fetch(OR_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OR_KEY}` },
      body: JSON.stringify({ model: OR_MODEL, messages: [{ role: 'user', content: prompt }], max_tokens: 120, temperature: 0.4 })
    });
    const aiData = await aiRes.json();
    const raw = aiData.choices?.[0]?.message?.content?.trim() || '[]';
    const clean = raw.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```$/,'').trim();
    try { related = JSON.parse(clean); } catch { related = []; }
  } catch {}

  const result = { urls, metas, infobox, related };
  aiResultsCache[query] = result;
  return result;
}

async function fetchMeta(url) {
  await _ready;
  if (metaCache[url]) return metaCache[url];
  const domain = (() => { try { return new URL(url).hostname.replace('www.',''); } catch { return url; } })();
  const fallback = {
    url, domain, title: domain, description: '',
    favicon: `https://www.google.com/s2/favicons?domain=${url}&sz=32`,
    ogImage: null
  };
  try {
    const res = await fetch('https://api.metadata.party/extract', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
      signal: AbortSignal.timeout(8000)
    });
    if (!res.ok) throw new Error('meta fail');
    const d = await res.json();
    const result = {
      url,
      domain:      d.domain || domain,
      title:       d.title  || domain,
      description: d.description || '',
      favicon:     d.favicon || `https://www.google.com/s2/favicons?domain=${url}&sz=32`,
      ogImage:     (d.images && d.images[0]) || null,
    };
    metaCache[url] = result;
    return result;
  } catch {
    metaCache[url] = fallback;
    return fallback;
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
async function renderResults() {
  const main    = document.getElementById('resultsMain');
  const sidebar = document.getElementById('sidebar');

  // ── AI path ──
  if (aiEnabled) {
    // If we already have everything cached for this query, just re-render instantly
    if (aiResultsCache[currentQuery] && metasCache[currentQuery]) {
      renderWithData(aiResultsCache[currentQuery], metasCache[currentQuery], sidebar);
      return;
    }

    const t0 = Date.now();
    main.innerHTML = `<div class="state-loading"><div class="spinner"></div><p id="loadMsg">Synaxing the web...</p></div>`;
    sidebar.innerHTML = '';

    let aiData;
    try {
      aiData = await fetchAIResults(currentQuery);
    } catch (e) {
      main.innerHTML = `<div class="state-empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>AI error: ${escHtml(e.message)}</p></div>`;
      renderFallback();
      return;
    }

    const lm = document.getElementById('loadMsg');
    if (lm) lm.textContent = 'Fetching site metadata…';

// Metas are already built inside fetchAIResults from your API
    const metas = aiData.metas || [];

    metasCache[currentQuery] = { metas, elapsed: ((Date.now()-t0)/1000).toFixed(2) };

    renderWithData(aiData, metasCache[currentQuery], sidebar);

  } else {
    // ── Fallback (AI off): local DB ──
    renderFallback();
  }
}

          const res = await fetch(
            `https://api.pexels.com/v1/search?query=${encodeURIComponent(currentQuery)}&per_page=6`,
            { headers: { Authorization: _sa } }
          );
          const data = await res.json();
          const photos = data.photos || [];
          if (!photos.length) { stripEl.remove(); return; }

          let shown = 3;
          const allPhotos = photos;

          function renderStrip() {
            const grid = stripEl.querySelector('#pexels-grid');
            grid.innerHTML = '';
            allPhotos.slice(0, shown).forEach(p => {
              const card = document.createElement('div');
              card.style.cssText = 'flex:0 0 calc(33.333% - 8px);min-width:120px;max-width:260px;cursor:pointer;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--card);transition:transform 0.15s,box-shadow 0.15s;';
              card.onmouseenter = () => { card.style.transform='scale(1.02)'; card.style.boxShadow='0 4px 16px rgba(0,0,0,.4)'; };
              card.onmouseleave = () => { card.style.transform=''; card.style.boxShadow=''; };
              card.addEventListener('click', () => openLightbox(p.src.large));

              const img = document.createElement('img');
              img.src = p.src.medium;
              img.alt = p.alt || currentQuery;
              img.loading = 'lazy';
              img.style.cssText = 'width:100%;height:clamp(90px,12vw,160px);object-fit:cover;display:block;';
              img.onerror = () => card.remove();

              const cap = document.createElement('div');
              cap.style.cssText = 'padding:6px 10px;font-size:11px;color:var(--muted);font-family:var(--mono);display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
              cap.innerHTML = `<span style="font-size:13px;">📷</span><span style="overflow:hidden;text-overflow:ellipsis;">${p.photographer}</span>`;

              card.appendChild(img);
              card.appendChild(cap);
              grid.appendChild(card);
            });

            const btn = stripEl.querySelector('#pexels-more-btn');
            if (shown >= allPhotos.length) {
              btn.style.display = 'none';
            } else {
              btn.style.display = 'flex';
              btn.onclick = () => { shown = allPhotos.length; renderStrip(); };
            }
          }

          renderStrip();
          stripEl.style.display = 'block';
        } catch { stripEl.remove(); }
      })();
    }

    // Remove per-result placeholders
    main.querySelectorAll('.result-pexels-img').forEach(el => el.remove());
  }
  // ── Sidebar ──
  let sb = '';
  if (aiData.infobox && currentTab === 'all') {
    const ib = aiData.infobox;
    const ibFav = ib.url ? `https://www.google.com/s2/favicons?domain=${encodeURIComponent(ib.url)}&sz=32` : '';
    sb += `<div class="infobox"><div class="infobox-body">
      ${ib.thumbnail ? `<img src="${escHtml(ib.thumbnail)}" alt="${escHtml(ib.title||'')}" style="width:100%;max-height:220px;object-fit:contain;background:#000;border-radius:4px;margin-bottom:12px;display:block;" onerror="this.remove()"/>` : ''}
      <div class="infobox-logo">
        ${ibFav ? `<img src="${escHtml(ibFav)}" alt="" onerror="this.remove()"/>` : ''}
        <div>
          <div class="infobox-title">${escHtml(ib.title||'')}</div>
          ${ib.subtitle ? `<div class="infobox-sub">${escHtml(ib.subtitle)}</div>` : ''}
        </div>
      </div>
      ${ib.description ? `<div class="infobox-desc">${escHtml(ib.description)}</div>` : ''}
      ${ib.url ? `<a class="infobox-link" href="${escHtml(ib.url)}">Read on Wikipedia ↗</a>` : ''}
    </div></div>`;
  }

  if (aiData.related?.length) {
    sb += `<div class="sidebar-card"><h3>Related Searches</h3>`;
    aiData.related.forEach(r => {
      sb += `<a class="related-item" href="#" data-q="${escHtml(r)}">
        <span class="rel-icon">${buildSearchIcon(12)}</span>
        <span class="rel-title">${escHtml(r)}</span>
      </a>`;
    });
    sb += `</div>`;
  }

  sidebar.innerHTML = sb;

  // Attach related search click handlers after innerHTML is set
  sidebar.querySelectorAll('.related-item[data-q]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      const q = el.getAttribute('data-q');
      document.getElementById('resultsInput').value = q;
      currentQuery = q;
      const url = new URL(location.href);
      url.searchParams.set('q', q);
      history.pushState({}, '', url.toString());
      renderResults();
    });
  });
}

async function fetchWikipediaInfobox(query) {
  try {
    // Search for the best matching article
    const searchRes = await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=1`
    );
    const searchData = await searchRes.json();
    const title = searchData?.query?.search?.[0]?.title;
    if (!title) return null;

    // Get the summary for that article
    const summaryRes = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`
    );
    const s = await summaryRes.json();
    if (!s || s.type === 'disambiguation') return null;

    return {
      title:       s.title,
      subtitle:    s.description || '',
      description: s.extract ? s.extract.slice(0, 400) + (s.extract.length > 400 ? '…' : '') : '',
      url:         s.content_urls?.desktop?.page || '',
      thumbnail:   s.thumbnail?.source || null
    };
  } catch { return null; }
}

async function fetchPexelsImages(query) {
  try {
    const res = await fetch(
      `https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=20`,
      { headers: { Authorization: _sa } }
    );
    if (!res.ok) throw new Error('Pexels error');
    const data = await res.json();
    return (data.photos || []).map(p => ({
      src: p.src.large,
      thumb: p.src.medium,
      alt: p.alt || query,
      photographer: p.photographer,
      url: p.url
    }));
  } catch { return []; }
}

function activateFilter(btn) {
  btn.closest('.filter-opts').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
function setRelated(e, q) {
  e.preventDefault();
  document.getElementById('resultsInput').value = q;
  currentQuery = q;
  const url = new URL(location.href);
  url.searchParams.set('q', q);
  history.pushState({}, '', url.toString());
  renderResults();
}

// ── FAVORITES ────────────────────────────────────────────────────────────────
function getFavorites() {
  try { return JSON.parse(localStorage.getItem('synax-favorites') || '[]'); } catch { return []; }
}
function saveFavorites(favs) {
  localStorage.setItem('synax-favorites', JSON.stringify(favs));
}
function renderFavorites() {
  const grid = document.getElementById('favGrid');
  const favs = getFavorites();
  if (!favs.length) {
    grid.innerHTML = `<span class="fav-empty">No favorites yet and add your first link!</span>`;
    return;
  }
  grid.innerHTML = favs.map((f, i) => {
    const favicon = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(f.url)}&sz=32`;
    return `<a class="fav-item" href="${escHtml(f.url)}"
        draggable="true" data-idx="${i}" style="animation-delay:${i*0.04}s">
      <img src="${escHtml(favicon)}" onerror="this.style.display='none'" alt=""/>
      <span class="fav-item-name">${escHtml(f.name)}</span>
      <button class="fav-delete" onclick="deleteFavorite(event,${i})" title="Remove">✕</button>
    </a>`;
  }).join('');
  initFavDrag();
}

function initFavDrag() {
  const grid = document.getElementById('favGrid');
  let dragSrcIdx = null;

  grid.querySelectorAll('.fav-item').forEach(item => {
    item.addEventListener('dragstart', e => {
      dragSrcIdx = parseInt(item.dataset.idx);
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      grid.querySelectorAll('.fav-item').forEach(el => el.classList.remove('drag-over'));
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      grid.querySelectorAll('.fav-item').forEach(el => el.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });
    item.addEventListener('dragleave', () => {
      item.classList.remove('drag-over');
    });
    item.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation(); // prevent the link from navigating
      const targetIdx = parseInt(item.dataset.idx);
      if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
      const favs = getFavorites();
      const [moved] = favs.splice(dragSrcIdx, 1);
      favs.splice(targetIdx, 0, moved);
      saveFavorites(favs);
      renderFavorites();
    });
    // Prevent link navigation when dragging
    item.addEventListener('click', e => {
      if (item.classList.contains('dragging')) e.preventDefault();
    });
  });
}
function openFavModal() {
  document.getElementById('favNameInput').value = '';
  document.getElementById('favUrlInput').value = '';
  document.getElementById('favModal').classList.add('open');
  setTimeout(() => document.getElementById('favNameInput').focus(), 50);
}
function closeFavModal(e) {
  if (e && e.currentTarget !== e.target) return;
  document.getElementById('favModal').classList.remove('open');
}
function saveFavorite() {
  const name = document.getElementById('favNameInput').value.trim();
  let url = document.getElementById('favUrlInput').value.trim();
  if (!name || !url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  const favs = getFavorites();
  favs.push({ name, url });
  saveFavorites(favs);
  document.getElementById('favModal').classList.remove('open');
  renderFavorites();
}
function deleteFavorite(e, idx) {
  e.preventDefault(); e.stopPropagation();
  const favs = getFavorites();
  favs.splice(idx, 1);
  saveFavorites(favs);
  renderFavorites();
}
// Allow Enter key in modal inputs
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeLightbox();
    document.getElementById('favModal').classList.remove('open');
  }
});
document.getElementById('favUrlInput')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') saveFavorite();
});
document.getElementById('favNameInput')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('favUrlInput').focus();
});

// ── INIT ─────────────────────────────────────────────────────────────────────
initAC('homeInput',    'homeAC');
initAC('resultsInput', 'resultsAC');

// Load from URL ?q=...
window.addEventListener('load', () => {
  renderFavorites();
  const params = new URLSearchParams(location.search);
  const q = params.get('q');
  if (q && q.trim()) {
    document.getElementById('homeInput').value = q;
    doSearch();
  }
});
window.addEventListener('popstate', () => {
  const params = new URLSearchParams(location.search);
  const q = params.get('q');
  if (q) { currentQuery = q; document.getElementById('resultsInput').value = q; renderResults(); }
  else goHome();
});
</script>
